name: Auto Fix on Failure

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI, Test, Build, Lint]
    types: [completed]
    branches: [main, master]

jobs:
  trigger-openclaw:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'failure')
    steps:
      - name: Trigger OpenClaw
        run: |
          curl -s -X POST "https://nonfortifying-nonliberal-gunnar.ngrok-free.dev/hooks/agent" \
            -H "Authorization: Bearer openclaw-hook-secret-2026" \
            -H "Content-Type: application/json" \
            -d "{\"message\": \"测试 GitHub webhook 触发\", \"name\": \"GitHub\", \"agentId\": \"main\"}"
